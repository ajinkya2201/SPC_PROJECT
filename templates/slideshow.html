<!DOCTYPE html>
<html>
<head>
    <title>Slideshow</title>

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            font-family: Arial;
            margin: 0;
            padding: 20px;
        }

        h2 {
            margin-bottom: 10px;
        }

        #slideImage {
            width: 80vw;
            height: 70vh;
            object-fit: contain;
            border-radius: 10px;
            background: white;
        }

        .controls {
            margin-top: 20px;
        }

        button, select, input {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        button {
            background: #667eea;
            color: white;
        }

        button:hover {
            background: #5a67d8;
        }

        select {
            background: white;
            color: black;
        }
    </style>
</head>

<body>
<h2>Slideshow Viewer</h2>
<a href="/dashboard">
    <button>Home</button>
</a>
<!-- Dropdown to select saved slideshow -->
<select id="slideshowDropdown">
    <option value="">Select Saved Slideshow</option>
</select>

<br><br>

<img id="slideImage">

<div class="controls">

    <button id="startBtn">Start</button>
    <button id="pauseBtn">Pause</button>

    <label>Interval (sec):</label>
    <input type="number" id="interval" value="3" min="1">

    <button id="saveBtn">Save Slideshow</button>

</div>

<script>

    let slideshowImages = [];
    let currentIndex = 0;
    let intervalTime = 3000;
    let slideshowTimer = null;
    
    
    // 🔽 Load all saved slideshows (DB)
    function loadSlideshows() {
        fetch("/get_slideshows")
        .then(res => res.json())
        .then(data => {
            const dropdown = document.getElementById("slideshowDropdown");
            dropdown.innerHTML = '<option value="">Select Saved Slideshow</option>';
    
            data.forEach(s => {
                let option = document.createElement("option");
                option.value = s.id;
                option.textContent = s.name;
                dropdown.appendChild(option);
            });
        });
    }
    
    
    // 🔽 When user selects slideshow
    document.getElementById("slideshowDropdown").onchange = function() {
        const id = this.value;
    
        if (!id) return;
    
        fetch(`/get_slideshow/${id}`)
        .then(res => res.json())
        .then(data => {
            slideshowImages = data.images || [];
            currentIndex = 0;
            intervalTime = (data.time || 3) * 1000;
    
            document.getElementById("interval").value = data.time || 3;
    
            showImage();
        });
    };
    
    
    // 🖼️ Show image
    function showImage() {
        if (slideshowImages.length === 0) return;
    
        document.getElementById("slideImage").src = slideshowImages[currentIndex];
    }
    
    
    // ▶ Start slideshow
    document.getElementById("startBtn").onclick = () => {
        if (slideshowImages.length === 0) {
            alert("No images to show!");
            return;
        }
    
        clearInterval(slideshowTimer);
    
        intervalTime = document.getElementById("interval").value * 1000;
    
        slideshowTimer = setInterval(() => {
            currentIndex = (currentIndex + 1) % slideshowImages.length;
            showImage();
        }, intervalTime);
    };
    
    
    // ⏸ Pause slideshow
    document.getElementById("pauseBtn").onclick = () => {
        clearInterval(slideshowTimer);
    };
    
    
    // 💾 Save slideshow (DB)
    document.getElementById("saveBtn").onclick = () => {
    
        if (slideshowImages.length === 0) {
            alert("No images to save!");
            return;
        }
    
        const name = prompt("Enter slideshow name:");
        if (!name) return;
    
        const data = {
            name: name,
            images: slideshowImages,
            time: document.getElementById("interval").value
        };
    
        fetch("/save_slideshow", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(res => res.text())
        .then(msg => {
            alert(msg);
            loadSlideshows(); // refresh dropdown
        });
    };
    
    
    // 🔥 Load slideshows on page load
    window.onload = loadSlideshows;
    
    </script>
    
</body>
</html>
