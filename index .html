<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="controls">
    <input type="file" id="imgInput" multiple accept="image/*" hidden>
    <button onclick="selectImages()">Select Images</button>
    <button onclick="saveJSON()">Save JSON</button>
    <input type="file" id="jsonInput" accept=".json" hidden>
    <button onclick="loadJSON()">Load JSON</button>

  </div>

  <h3>Gallery</h3>
  <div id="gallery" class="gallery"></div>

  <h3>Slideshow</h3>
  <div class="slideshow">
    <img id="slideshowImg">
  </div>
  <div>
  <button onclick="startSlideshow()">Start Slideshow</button>
  <button onclick="pauseSlideshow()">Pause Slideshow</button>
  <button onclick="deleteSelected()">Delete Selected</button>
</div>

<label>Slideshow Interval:</label>

<select id="intervalSelect">
  <option value="1">1 second</option>
  <option value="2" selected>2 seconds</option>
  <option value="3">3 seconds</option>
  <option value="4">4 seconds</option>
  <option value="5">5 seconds</option>
</select>
  <script src="script.js"></script>
</body>
</html>
