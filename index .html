<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Photo Gallery</h2>

<input type="file" id="imageInput" accept="image/*" multiple>

<h3>Available Images</h3>
<div id="previewContainer" class="grid"></div>

<h3>Slideshow Images</h3>
<div id="timeline" class="grid dropzone"></div>

<div class="controls">

<button id="startSlideshow">Start Slideshow</button>
<button id="pauseSlideshow">Pause</button>
<button id="saveJson">Save JSON</button>

<label>Slide Time (seconds):</label>
<input type="number" id="slideTime" value="2" min="1">

<br><br>

<label for="loadJson" class="loadBtn">Load JSON</label>
<input type="file" id="loadJson" accept=".json" hidden>

</div>

<div id="slideshow">
<img id="slideImage">
</div>

<script src="script.js"></script>

</body>
</html>
